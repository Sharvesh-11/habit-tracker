name: ci/cd habit-tracker

on:
  push:
    branches:
      - main

jobs:

  test:
    -name: test the app
     runs-on: ubuntu-latest
    
    steps: 
      -name: code-checkout
       uses: actions/checkout@v4

      -name: version
       uses: actions/setup-python@v5
       with:
         python-version:"3.11"   
   
      -name: install dependencies
       run: |
            pip install --upgrade pip
            pip install -r backend/requirements.txt 
       
      -name: test
       run: |
         cd backend 
         pytest test_main.py


  build-and-push:
    
    -name: buid and push
     runs-on: ubuntu-latest   
     needs: test       

    steps:
       -name: checkout
        uses: actions/checkout@v4
      
       -name: login to dockerHub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_TOKEN}}
   
       -name: build and push backend
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/habit-tracker-backend:latest ./backend
          docker push ${{secrets.DOCKER_USERNAME}}/habit-tracker-backend:latest        
    
       -name: build and push frontend
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/habit-tracker-frontend:latest ./frontend  
          docker push ${{secrets.DOCKER_USERNAME}}/habit-tracker-frontend:latest
  deploy:
    
    -name: deploy
     runs-on: ubuntu-latest
     needs: build-and-push

    steps: 
      
      -name:shh via ec2
       uses: appleboy/ssh-action@v1.0.3 
       with:
         host: ${{secrets.EC2_IP}}
         username: ${{secrets.EC2_USERNAME}}
         key: ${{secrets.EC2_SSH_KEY}}          

       script: |
         cd ~/habit-tracker
         export DOCKER_USERNAME=${{secrets.DOCKER_USERNAME}}  
         docker compose pull
         docker compose up -d --force-recreate
         docker image prune -f   
