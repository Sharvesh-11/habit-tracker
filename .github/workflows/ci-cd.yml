name: ci/cd habit-tracker

on:
  push:
    branches:
      - main

jobs:
  test:
    name: test the app
    runs-on: ubuntu-latest

    steps:
      - name: code-checkout
        uses: actions/checkout@v4

      - name: debug docker secrets (temporary)
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "DOCKER_USERNAME is EMPTY";
          else
            echo "DOCKER_USERNAME is SET";
          fi
          if [ -z "${{ secrets.DOCKER_TOKEN }}" ]; then
            echo "DOCKER_TOKEN is EMPTY";
          else
            echo "DOCKER_TOKEN IS SET";
          fi

      - name: setup python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: create .env file for tests
        working-directory: backend
        run: |
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> .env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> .env

      - name: run tests
        run: |
          cd backend
          pytest test_main.py

  build-and-push:
    name: build and push
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: login to Docker Hub (CLI)
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: build and push backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/habit-tracker-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/habit-tracker-backend:latest

      - name: build and push frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/habit-tracker-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/habit-tracker-frontend:latest

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: ssh via ec2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_IP }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /var/www/app/habit-tracker || exit 1
            git pull origin main
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            export GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            export GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            export SECRET_KEY=${{ secrets.SECRET_KEY }}
            export FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            export API_BASE_URL=${{ secrets.API_BASE_URL }}
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
